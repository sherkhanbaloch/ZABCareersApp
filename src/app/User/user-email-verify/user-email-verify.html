<section class="contact-section">
    <div class="container">
        <div class="row">
            <div class="col-12">
                <h2 class="contact-title text-center">User Email Verification</h2>
                <hr>
            </div>
            <div class="col-lg-10 mx-auto">
                <form [formGroup]="VerifyForm" (ngSubmit)="VerifyOTP()" class="form-contact contact_form" id="contactForm" novalidate="novalidate">
                    <div class="row">
                        <div class="col-md-6 mx-auto">
                            <div class="form-group">
                                <label class="form-label">Enter OTP</label>
                                <input class="form-control valid" id="name" type="text" onfocus="this.placeholder = ''"
                                    onblur="this.placeholder = 'Enter OTP'" placeholder="Enter OTP" formControlName="OTPNumber">
                            </div>
                        </div>
                    </div>
                    <div class="form-group mt-3 text-center">
                        <button type="submit" class="button button-contactForm boxed-btn">Verify Email</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
