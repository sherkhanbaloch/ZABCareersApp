<section class="contact-section">
    <div class="container">
        <div class="row">
            <div class="col-12">
                <h2 class="contact-title text-center">Create an Account</h2>
                <hr>
            </div>
            <div class="col-lg-10 mx-auto">
                <form [formGroup]="AddUserForm" (ngSubmit)="SaveUser()" class="form-contact contact_form" id="contactForm" novalidate="novalidate">
                    <div class="row">
                        <div class="col-sm-12">
                            <div class="form-group">
                                <label class="form-label">Name</label>
                                <span *ngIf="AddForm.candidateName.invalid && AddForm.candidateName.touched" class="text-danger fw-bold"> *</span>
                                
                                <input class="form-control valid" id="name" type="text"
                                    onfocus="this.placeholder = ''" onblur="this.placeholder = 'Enter your name'"
                                    placeholder="Enter your name" formControlName="candidateName">
                            </div>
                        </div>
                        <div class="col-sm-6">
                           <div class="form-group">
                                <label class="form-label">Email</label>
                                <span *ngIf="AddForm.candidateEmail.invalid && AddForm.candidateEmail.touched" class="text-danger fw-bold"> *</span>
                                <input class="form-control valid" id="email" type="email"
                                    onfocus="this.placeholder = ''" onblur="this.placeholder = 'Enter email address'"
                                    placeholder="Email" formControlName="candidateEmail">
                            </div>
                        </div>
                        <div class="col-sm-6">
                             <div class="form-group">
                                <label class="form-label">Mobile</label>
                                <span *ngIf="AddForm.candidateMobile.invalid && AddForm.candidateMobile.touched" class="text-danger fw-bold"> *</span>
                                <input class="form-control" id="mobile" type="text"
                                    onfocus="this.placeholder = ''" onblur="this.placeholder = 'Enter Mobile'"
                                    placeholder="Enter Mobile" formControlName="candidateMobile">
                            </div>
                        </div>
                        <div class="col-sm-6">
                             <div class="form-group">
                                <label class="form-label">Resume</label>
                                <span *ngIf="AddForm.candidateResume.invalid && AddForm.candidateResume.touched" class="text-danger fw-bold"> *</span>
                                <input class="form-control" type="file"
                                    onfocus="this.placeholder = ''" onblur="this.placeholder = 'Enter Resume'"
                                    placeholder="Enter Resume" (change)="onFileChange($event)">
                            </div>
                        </div>
                        <div class="col-sm-6">
                             <div class="form-group">
                                <label class="form-label">Password</label>
                                <span *ngIf="AddForm.candidatePassword.invalid && AddForm.candidatePassword.touched" class="text-danger fw-bold"> *</span>
                                <input class="form-control" id="password" type="password"
                                    onfocus="this.placeholder = ''" onblur="this.placeholder = 'Enter Password'"
                                    placeholder="Enter Password" formControlName="candidatePassword">
                            </div>
                        </div>
                    </div>
                    <div class="form-group mt-3 text-center">
                        <button type="submit" [disabled]="AddUserForm.invalid" class="button button-contactForm boxed-btn">Register</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
