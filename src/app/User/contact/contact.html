<!-- Hero Area Start-->
<div class="slider-area ">
    <div class="single-slider section-overly slider-height2 d-flex align-items-center"
        data-background="/User/assets/img/hero/about.jpg">
        <div class="container">
            <div class="row">
                <div class="col-xl-12">
                    <div class="hero-cap text-center">
                        <h2>Contact us</h2>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Hero Area End -->
<!-- ================ contact section start ================= -->
<section class="contact-section">
    <div class="container">
        <div class="row">
            <div class="col-12">
                <h2 class="contact-title">Get in Touch</h2>
            </div>
            <div class="col-lg-8">
                <form [formGroup]="AddMessageForm" (ngSubmit)="SaveMessage()" class="form-contact contact_form"
                    id="contactForm" novalidate="novalidate">
                    <div class="row">
                        <div class="col-sm-6">
                            <div class="form-group">
                                <label><span *ngIf="AddForm.name.invalid && AddForm.name.touched"
                                        class="text-danger fw-bold"> *</span>
                                    Name</label>
                                <input class="form-control valid" formControlName="name" id="name" type="text"
                                    onfocus="this.placeholder = ''" onblur="this.placeholder = 'Enter your name'"
                                    placeholder="Enter your name">
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <div class="form-group">
                                <label><span *ngIf="AddForm.email.invalid && AddForm.email.touched"
                                        class="text-danger fw-bold"> *</span>
                                    Email</label>
                                <input class="form-control valid" formControlName="email" id="email" type="email"
                                    onfocus="this.placeholder = ''" onblur="this.placeholder = 'Enter email address'"
                                    placeholder="Email">
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="form-group">
                                <label><span *ngIf="AddForm.subject.invalid && AddForm.subject.touched"
                                        class="text-danger fw-bold"> *</span>
                                    Subject</label>
                                <input class="form-control" formControlName="subject" id="subject" type="text"
                                    onfocus="this.placeholder = ''" onblur="this.placeholder = 'Enter Subject'"
                                    placeholder="Enter Subject">
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="form-group">
                                <label><span *ngIf="AddForm.messageText.invalid && AddForm.messageText.touched"
                                        class="text-danger fw-bold"> *</span>
                                    Message</label>
                                <textarea class="form-control w-100" formControlName="messageText" id="message"
                                    cols="30" rows="9" onfocus="this.placeholder = ''"
                                    onblur="this.placeholder = 'Enter Message'" placeholder=" Enter Message"></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="form-group mt-3">
                        <button type="submit" [disabled]="AddMessageForm.invalid"
                            class="button button-contactForm boxed-btn">Send Message</button>
                    </div>
                </form>
            </div>
            <div class="col-lg-3 offset-lg-1">
                <div class="media contact-info">
                    <span class="contact-info__icon"><i class="ti-home"></i></span>
                    <div class="media-body">
                        <h3>SZABIST Larkana Campus</h3>
                        <p>Sachal Colony, Larkana, Sindh, Pakistan</p>
                    </div>
                </div>
                <div class="media contact-info">
                    <span class="contact-info__icon"><i class="ti-tablet"></i></span>
                    <div class="media-body">
                        <h3>(92-74) 4752890-3</h3>
                        <p>Mon to Sat 9am to 6pm</p>
                    </div>
                </div>
                <div class="media contact-info">
                    <span class="contact-info__icon"><i class="ti-email"></i></span>
                    <div class="media-body">
                        <h3>info@lrk.szabist.edu.pk</h3>
                        <p>Send us your query anytime!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
<!-- ================ contact section end ================= -->
