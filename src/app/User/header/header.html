<header>
    <!-- Header Start -->
    <div class="header-area header-transparrent">
        <div class="headder-top header-sticky">
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-lg-3 col-md-2">
                        <!-- Logo -->
                        <div class="logo">
                            <a href="/user/home"><img src="/User/assets/img/logo/logo.png" alt=""></a>
                        </div>
                    </div>
                    <div class="col-lg-9 col-md-9">
                        <div class="menu-wrapper">
                            <!-- Main-menu -->
                            <div class="main-menu">
                                <nav class="d-none d-lg-block">
                                    <ul id="navigation">
                                        <li><a href="/user/home">Home</a></li>
                                        <li><a href="/user/job-listing">Find a Jobs </a></li>
                                        <li><a href="/user/about">About</a></li>
                                        <li><a href="/user/contact">Contact</a></li>
                                    </ul>
                                </nav>
                            </div>
                            <!-- Header-btn -->
                            @if (!isLoggedIn()) {
                            <div class="header-btn d-none f-right d-lg-block">
                                <a href="/user/register-user" class="btn head-btn1">Register</a>
                                <a href="/user/user-login" class="btn head-btn2">Login</a>
                            </div>
                            }
                            @else{
                            <div class="header-btn d-none f-right d-lg-block">
                                <a href="/user/profile" class="btn head-btn1">Profile</a>
                                <a (click)="LogoutUser()" class="btn head-btn2">Logout</a>
                            </div>
                            }
                        </div>
                    </div>
                    <!-- Mobile Menu -->
                    <div class="col-12">
                        <div class="mobile_menu d-block d-lg-none"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Header End -->
</header>
