<!-- Basic Layout -->
<div class="row">
    <div class="col-xl">
        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Update Existing Job</h5>
            </div>
            <div class="card-body">
                <form class="form" [formGroup]="EditJobForm" (ngSubmit)="UpdateJob()">
                    <div class="row">
                        <div class="mb-3 col-md-6">
                            <label class="form-label">Job Title</label>
                            <span *ngIf="EditForm.jobTitle.invalid && EditForm.jobTitle.touched"
                                class="text-danger fw-bold">
                                *</span>
                            <input type="text" class="form-control" formControlName="jobTitle">
                        </div>
                        <div class="mb-3 col-md-6">
                            <label class="form-label">Featured Image</label>
                            <input type="file" class="form-control" (change)="onFileChange($event)">
                        </div>
                        <div class="mb-3 col-md-6">
                            <label class="form-label">Vacancy</label>
                            <span *ngIf="EditForm.vacancy.invalid && EditForm.vacancy.touched"
                                class="text-danger fw-bold">
                                *</span>
                            <input type="number" class="form-control" formControlName="vacancy">
                        </div>
                        <div class="mb-3 col-md-6">
                            <label class="form-label">Employment Status</label>
                            <span *ngIf="EditForm.employmentStatus.invalid && EditForm.employmentStatus.touched"
                                class="text-danger fw-bold">
                                *</span>
                            <select class="form-control" formControlName="employmentStatus">
                                <option ngValue="">Select Employment Status</option>
                                <option ngValue="Part Time">Part Time</option>
                                <option ngValue="Full Time">Full Time</option>
                                <option ngValue="Contract">Contract</option>
                            </select>
                        </div>
                        <div class="mb-3 col-md-6">
                            <label class="form-label">Experience</label>
                            <span *ngIf="EditForm.experience.invalid && EditForm.experience.touched"
                                class="text-danger fw-bold">
                                *</span>
                            <input type="text" class="form-control" formControlName="experience">
                        </div>
                        <div class="mb-3 col-md-6">
                            <label class="form-label">Job Location</label>
                            <span *ngIf="EditForm.jobLocation.invalid && EditForm.jobLocation.touched"
                                class="text-danger fw-bold">
                                *</span>
                            <select class="form-control" formControlName="jobLocation">
                                <option value="">Select Location</option>
                                @for (c of ListofCampuses(); track c.campusId) {
                                <option [value]="c.campusName">
                                    {{ c.campusName }}
                                </option>
                                }
                            </select>
                        </div>
                        <div class="mb-3 col-md-6">
                            <label class="form-label">Salary</label>
                            <span *ngIf="EditForm.salary.invalid && EditForm.salary.touched"
                                class="text-danger fw-bold">
                                *</span>
                            <input type="text" class="form-control" formControlName="salary">
                        </div>
                        <div class="mb-3 col-md-6">
                            <label class="form-label">Gender</label>
                            <span *ngIf="EditForm.gender.invalid && EditForm.gender.touched"
                                class="text-danger fw-bold">
                                *</span>
                            <select class="form-control" formControlName="gender">
                                <option ngValue="">Select Gender</option>
                                <option ngValue="Any">Any</option>
                                <option ngValue="Male">Male</option>
                                <option ngValue="Female">Female</option>
                                <option ngValue="Others">Others</option>
                            </select>
                        </div>
                        <div class="mb-3 col-md-6">
                            <label class="form-label">Published on</label>
                            <span *ngIf="EditForm.publishedOn.invalid && EditForm.publishedOn.touched"
                                class="text-danger fw-bold">
                                *</span>
                            <input type="date" class="form-control" formControlName="publishedOn">
                        </div>
                        <div class="mb-3 col-md-6">
                            <label class="form-label">Application Deadline</label>
                            <span *ngIf="EditForm.applicationDeadline.invalid && EditForm.applicationDeadline.touched"
                                class="text-danger fw-bold">
                                *</span>
                            <input type="date" class="form-control" formControlName="applicationDeadline">
                        </div>
                        <div class="mb-3 col-md-6">
                            <label class="form-label">Campus</label>
                            <span *ngIf="EditForm.campusId.invalid && EditForm.campusId.touched"
                                class="text-danger fw-bold">
                                *</span>
                            <select class="form-control" formControlName="campusId">
                                <option value="">Select Campus</option>
                                @for (c of ListofCampuses(); track c.campusId) {
                                <option [value]="c.campusId">
                                    {{ c.campusName }}
                                </option>
                                }
                            </select>
                        </div>
                        <div class="mb-3 col-md-6">
                            <label class="form-label">Department</label>
                            <span *ngIf="EditForm.departmentId.invalid && EditForm.departmentId.touched"
                                class="text-danger fw-bold">
                                *</span>
                            <select class="form-control" formControlName="departmentId">
                                <option value="">Select Department</option>
                                @for (d of ListofDepartments(); track d.departmentId) {
                                <option [value]="d.departmentId">
                                    {{ d.departmentName }}
                                </option>
                                }
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Job Description</label>
                            <span *ngIf="EditForm.jobDescription.invalid && EditForm.jobDescription.touched"
                                class="text-danger fw-bold">
                                *</span>
                            <textarea class="form-control" id="editor-jd" formControlName="jobDescription"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Responsibilities</label>
                            <span *ngIf="EditForm.responsibilities.invalid && EditForm.responsibilities.touched"
                                class="text-danger fw-bold">
                                *</span>
                            <textarea class="form-control" id="editor-r" formControlName="responsibilities"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Education + Experience</label>
                            <span
                                *ngIf="EditForm.educationAndExperience.invalid && EditForm.educationAndExperience.touched"
                                class="text-danger fw-bold">
                                *</span>
                            <textarea class="form-control" id="editor-ee"
                                formControlName="educationAndExperience"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Other Benefits</label>
                            <span *ngIf="EditForm.otherBenefits.invalid && EditForm.otherBenefits.touched"
                                class="text-danger fw-bold">
                                *</span>
                            <textarea class="form-control" id="editor-ob" formControlName="otherBenefits"></textarea>
                        </div>
                        <button type="submit" [disabled]="EditJobForm.invalid" class="btn btn-primary">Update Job</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    ClassicEditor
        .create(document.querySelector('#editor-jd'))
        .catch(error => {
            console.error(error);
        });
</script>

<script>
    ClassicEditor
        .create(document.querySelector('#editor-r'))
        .catch(error => {
            console.error(error);
        });
</script>

<script>
    ClassicEditor
        .create(document.querySelector('#editor-ee'))
        .catch(error => {
            console.error(error);
        });
</script>

<script>
    ClassicEditor
        .create(document.querySelector('#editor-ob'))
        .catch(error => {
            console.error(error);
        });
</script>
